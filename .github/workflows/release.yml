name: Build and Release

on:
  # 当推送标签时触发（例如 v8.6.0）
  push:
    tags:
      - 'v*'

  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（例如：v8.6.0）'
        required: true
        default: 'v8.6.0'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          # Windows 构建
          - os: windows-latest
            platform: Windows
            artifact_name: LinuxDoHelper_Windows.exe
            build_name: LinuxDoHelper_Windows

          # macOS 构建（Intel）
          - os: macos-13
            platform: macOS-Intel
            artifact_name: LinuxDoHelper_macOS_Intel
            build_name: LinuxDoHelper_macOS_Intel

          # macOS 构建（Apple Silicon）
          - os: macos-latest
            platform: macOS-ARM
            artifact_name: LinuxDoHelper_macOS_ARM
            build_name: LinuxDoHelper_macOS_ARM

          # Linux 构建
          - os: ubuntu-latest
            platform: Linux
            artifact_name: LinuxDoHelper_Linux
            build_name: LinuxDoHelper_Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'Windows'
        run: |
          pyinstaller --onefile --windowed `
            --name "${{ matrix.build_name }}" `
            --icon "icon.ico" `
            --add-data "icon.ico;." `
            --hidden-import tkinter `
            --hidden-import tkinter.ttk `
            --hidden-import tkinter.scrolledtext `
            --hidden-import tkinter.messagebox `
            --hidden-import DrissionPage `
            --hidden-import pystray `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageDraw `
            --collect-all DrissionPage `
            --clean --noconfirm `
            linux_do_gui.py

      - name: Build with PyInstaller (macOS)
        if: startsWith(matrix.platform, 'macOS')
        run: |
          pyinstaller --onefile --windowed \
            --name "${{ matrix.build_name }}" \
            --icon "icon.ico" \
            --add-data "icon.ico:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.scrolledtext \
            --hidden-import tkinter.messagebox \
            --hidden-import DrissionPage \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageDraw \
            --collect-all DrissionPage \
            --clean --noconfirm \
            linux_do_gui.py

      - name: Build with PyInstaller (Linux)
        if: matrix.platform == 'Linux'
        run: |
          pyinstaller --onefile --windowed \
            --name "${{ matrix.build_name }}" \
            --add-data "icon.ico:." \
            --hidden-import tkinter \
            --hidden-import tkinter.ttk \
            --hidden-import tkinter.scrolledtext \
            --hidden-import tkinter.messagebox \
            --hidden-import DrissionPage \
            --collect-all DrissionPage \
            --clean --noconfirm \
            linux_do_gui.py

      - name: Rename Windows executable
        if: matrix.platform == 'Windows'
        run: |
          cd dist
          Rename-Item "${{ matrix.build_name }}.exe" "${{ matrix.artifact_name }}"

      - name: Create ZIP for macOS
        if: startsWith(matrix.platform, 'macOS')
        run: |
          cd dist
          if [ -d "${{ matrix.build_name }}.app" ]; then
            # 如果生成了 .app 包
            zip -r "${{ matrix.artifact_name }}.zip" "${{ matrix.build_name }}.app"
          else
            # 如果是单个可执行文件
            zip "${{ matrix.artifact_name }}.zip" "${{ matrix.build_name }}"
          fi

      - name: Create tar.gz for Linux
        if: matrix.platform == 'Linux'
        run: |
          cd dist
          tar -czf "${{ matrix.artifact_name }}.tar.gz" "${{ matrix.build_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            dist/${{ matrix.artifact_name }}
            dist/${{ matrix.artifact_name }}.zip
            dist/${{ matrix.artifact_name }}.tar.gz
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded files
        run: |
          echo "Downloaded artifacts:"
          find artifacts -type f

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          body: |
            ## 🎉 Linux.do 刷帖助手 ${{ steps.get_version.outputs.version }}

            ### 📦 下载说明

            - **Windows 用户**：下载 `LinuxDoHelper_Windows.exe`
            - **macOS 用户（Intel）**：下载 `LinuxDoHelper_macOS_Intel.zip`
            - **macOS 用户（Apple Silicon）**：下载 `LinuxDoHelper_macOS_ARM.zip`
            - **Linux 用户**：下载 `LinuxDoHelper_Linux.tar.gz`

            ### 🚀 使用方法

            1. 下载对应平台的文件
            2. Windows：直接双击运行 `.exe` 文件
            3. macOS：解压后双击运行（首次需要右键->打开）
            4. Linux：解压后在终端运行 `./LinuxDoHelper_Linux`

            ### 📝 更新内容

            请查看 [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG_v8.6.md)

            ---

            **完整更新日志**请查看下方自动生成的 Release Notes
          files: |
            artifacts/**/*.exe
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
